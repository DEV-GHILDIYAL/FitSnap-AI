name: Deploy Next.js SaaS to AWS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build & Deploy to AWS Lambda
    runs-on: ubuntu-latest
    
    # Since the Next.js project is nested inside "fitsnap-ai" folder,
    # all runner commands must execute inside it.
    defaults:
      run:
        working-directory: ./fitsnap-ai

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './fitsnap-ai/package-lock.json'

      - name: Install Secure Dependencies
        run: npm ci

      - name: Build and Configure Executables
        run: |
          npm run build:lambda
          chmod +x run.sh
        env:
          NEXTAUTH_URL: "https://fitsnap.ai"

      - name: Deploy to AWS Lambda (Serverless)
        run: npx serverless@3 deploy --stage prod --verbose
        env:
          # Serverless CLI / AWS CLI credentials
          AWS_ACCESS_KEY_ID: ${{ secrets.CUSTOM_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CUSTOM_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

          # Application-level env vars forwarded to Lambda via serverless.yml
          CUSTOM_AWS_ACCESS_KEY_ID: ${{ secrets.CUSTOM_AWS_ACCESS_KEY_ID }}
          CUSTOM_AWS_SECRET_ACCESS_KEY: ${{ secrets.CUSTOM_AWS_SECRET_ACCESS_KEY }}
          CUSTOM_AWS_REGION: us-east-1
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
